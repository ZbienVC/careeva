# Deploy the apply worker as a SECOND Railway service in the same project.
#
# Service settings:
#   - Root Directory: leave EMPTY (repo root) — the build needs ../prisma/schema.prisma
#   - Settings -> Config-as-code -> Config file path: worker/railway.toml
#   - Attach the SAME volume as the web service (same mount path, e.g. /data)
#   - Env: DATABASE_URL = same Postgres as the web app

[build]
builder = "nixpacks"
# Copy the schema INTO the worker before generating: Prisma outputs the client
# into the node_modules nearest the schema, and the worker must end up with the
# generated client in its OWN node_modules (.prisma/client), not the repo root's.
buildCommand = "cd worker && npm install --include=dev && rm -rf ./prisma && cp -r ../prisma ./prisma && npx prisma generate --schema=./prisma/schema.prisma && npx playwright install --with-deps chromium && npm run build"
watchPatterns = ["worker/**", "prisma/**"]

[deploy]
startCommand = "cd worker && npm run start"
